<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>POSTECH - FULLSTACK</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="container">
            <header class="header">
                <div class="header-content">
                    <h1>POSTECH - FULLSTACK</h1>
                    <p>Desafio aula inaugurar!</p>
                </div>
            </header>

            <main class="main-content">
                <div class="form-card">
                    <h2>Informações do grupo</h2>

                    <form id="groupForm">
                        <div class="form-group">
                            <label for="nome1">Nome</label>
                            <input
                                type="text"
                                id="nome1"
                                name="nome1"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="nome2">Nome</label>
                            <input
                                type="text"
                                id="nome2"
                                name="nome2"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="nome3">Nome</label>
                            <input
                                type="text"
                                id="nome3"
                                name="nome3"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="nome4">Nome</label>
                            <input
                                type="text"
                                id="nome4"
                                name="nome4"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="nome5">Nome</label>
                            <input
                                type="text"
                                id="nome5"
                                name="nome5"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="historico">Histórico do grupo</label>
                            <textarea
                                id="historico"
                                name="historico"
                                rows="6"
                                required
                            ></textarea>
                        </div>

                        <button type="submit" class="btn-submit">Enviar</button>
                    </form>
                </div>
            </main>
        </div>
    </body>
</html>
